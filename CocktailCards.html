<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cartes de Cocktails</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<h1>🍸 Cartes de Cocktails</h1>

<div class="search-container">
    <input type="text" id="search-input" placeholder="Rechercher un cocktail ou un ingrédient...">
</div>

<div class="grid"></div>

<template id="card-template">
    <div class="card">
        <div class="card-inner">
            <div class="card-front">
                <img src="" alt="">
                <h2></h2>
            </div>
            <div class="card-back">
                <h3>Ingrédients</h3>
                <ul></ul>
                <h3>Recette</h3>
                <ol></ol>
            </div>
        </div>
    </div>
</template>

</body>
</html>
